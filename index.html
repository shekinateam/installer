<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
<title>골프존 POS 고객지원</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
html{margin-top:-40px}
:root{--p:#1f8f5f;--pl:#27b578;--bg:#111;--bg3:#2a2a2a;--bg4:#333;--t1:#f0f0f0;--t2:#aaa;--t3:#666;--bd:#2e2e2e}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{height:calc(100%+40px);background:var(--bg);font-family:'Pretendard',sans-serif;color:var(--t1)}
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto}

/* 헤더 */
#hd{display:flex;align-items:center;gap:10px;padding:13px 16px;background:var(--bg);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:10}
.av{width:34px;height:34px;border-radius:50%;background:#166534;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;position:relative}
.dot{width:7px;height:7px;border-radius:50%;background:#22c55e;position:absolute;bottom:-1px;right:-1px;box-shadow:0 0 0 2px var(--bg)}
.hi{flex:1}
.hi .ti{font-size:14px;font-weight:700}
.hi .su{font-size:11px;color:var(--t2);margin-top:1px}
.nb{width:34px;height:34px;border-radius:50%;background:var(--bg3);border:1px solid var(--bd);color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.nb:hover{background:var(--p);color:#fff;border-color:var(--p)}
.nb:active{transform:scale(.93)}

/* 채팅 */
#chat{flex:1;overflow-y:auto;padding:14px 12px 20px;display:flex;flex-direction:column;gap:6px;scroll-behavior:smooth}
#chat::-webkit-scrollbar{width:0}

/* 플로팅 TOP 버튼 */
#fab{
  display:none;position:fixed;
  bottom:80px;right:calc(50% - 240px + 16px);
  width:42px;height:42px;border-radius:50%;
  background:var(--p);border:none;
  color:#fff;cursor:pointer;
  box-shadow:0 4px 16px rgba(31,143,95,.45);
  align-items:center;justify-content:center;
  z-index:20;transition:opacity .25s,transform .25s;
  opacity:0;transform:scale(.7);
}
#fab.show{display:flex;opacity:1;transform:scale(1)}
#fab:active{transform:scale(.9)}
@media(max-width:480px){#fab{right:16px}}

/* 입력바 */
#ib{padding:9px 12px 14px;background:var(--bg);border-top:1px solid var(--bd);display:flex;gap:8px;align-items:center;flex-shrink:0}
#ui{flex:1;background:var(--bg3);border:1px solid var(--bd);border-radius:22px;padding:10px 16px;font-size:14px;font-family:'Pretendard',sans-serif;color:var(--t1);outline:none;transition:border-color .2s}
#ui::placeholder{color:var(--t3)}
#ui:focus{border-color:var(--p)}
#sb{width:40px;height:40px;border-radius:50%;background:var(--p);border:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.15s}
#sb:hover{background:var(--pl)}
#sb:disabled{background:var(--bg4);cursor:not-allowed}

/* 말풍선 */
.row{display:flex;flex-direction:column}
.row.bot{align-items:flex-start}
.row.usr{align-items:flex-end}
.bub{max-width:85%;padding:11px 14px;border-radius:17px;font-size:14px;line-height:1.65;word-break:break-word;white-space:pre-wrap}
.row.bot .bub{background:#242424;border-bottom-left-radius:3px}
.row.usr .bub{background:var(--p);color:#fff;border-bottom-right-radius:3px}
.ts{font-size:10px;color:var(--t3);margin:2px 3px}

/* 환영 */
.info-bub{background:#242424;border-radius:17px;border-bottom-left-radius:3px;padding:14px 15px;font-size:14px;line-height:1.7;max-width:90%}
.hr{display:flex;justify-content:space-between;font-size:12px;padding:2px 0;color:var(--t2)}
.tel-row{margin-top:9px;padding-top:9px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:5px;font-size:13px}

/* 퀵버튼 */
.q-wrap{display:flex;flex-direction:column;gap:7px;width:92%;margin-top:4px}
.qb{width:100%;padding:12px 15px;background:var(--bg3);color:var(--t1);border:1px solid var(--bd);border-radius:13px;font-size:14px;font-family:'Pretendard',sans-serif;font-weight:500;text-align:left;cursor:pointer;transition:.15s}
.qb:hover{background:var(--bg4)}
.qb:active{transform:scale(.98)}
.qb .tag{color:var(--pl);margin-right:3px}

/* 카드 */
.card{background:#242424;border:1px solid var(--bd);border-radius:17px;border-bottom-left-radius:3px;overflow:hidden;max-width:92%}
.card-ti{padding:11px 14px 9px;font-size:14px;font-weight:700;border-bottom:1px solid var(--bd);color:var(--pl)}
.card-su{padding:9px 14px 5px;font-size:13px;color:var(--t2);line-height:1.55}
.card-step{display:flex;gap:9px;align-items:flex-start;padding:7px 14px;font-size:13px;line-height:1.55}
.snum{width:19px;height:19px;border-radius:50%;background:var(--p);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:2px}
.card-step b{color:var(--t1);font-weight:600}
.card-step span{color:var(--t2)}

/* 이미지 - 레이지 로딩 */
.card-img-wrap{margin:4px 14px 10px;border-radius:9px;overflow:hidden;cursor:zoom-in;background:var(--bg3)}
.card-img{width:100%;display:block;opacity:0;transition:opacity .3s}
.card-img.loaded{opacity:1}
.img-hint{font-size:10px;color:var(--t3);text-align:center;padding:3px 0 6px}

.card-txt{margin:5px 14px 10px;padding:9px 11px;background:var(--bg3);border-radius:7px;font-size:12px;color:var(--t2);line-height:1.55}
.card-btn{display:block;margin:7px 14px 11px;padding:10px;background:var(--p);color:#fff;font-size:13px;font-weight:600;text-align:center;border-radius:9px;border:none;cursor:pointer;width:calc(100% - 28px);font-family:'Pretendard',sans-serif}
.card-btn:hover{background:var(--pl)}

/* 더 보기 버튼 */
.more-btn{display:inline-flex;align-items:center;gap:5px;margin-top:4px;padding:7px 13px;background:var(--bg3);border:1px solid var(--bd);border-radius:18px;font-size:12px;color:var(--t2);cursor:pointer;transition:.15s}
.more-btn:hover{background:var(--bg4);color:var(--t1)}

/* 로딩 */
.dots{display:flex;gap:4px;align-items:center;padding:12px 15px}
.dots span{width:6px;height:6px;border-radius:50%;background:var(--t3);animation:blink 1.2s ease-in-out infinite}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{transform:scale(.7);opacity:.4}40%{transform:scale(1);opacity:1}}

/* 이미지 오버레이 */
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:999;align-items:center;justify-content:center;padding:20px}
#ov.on{display:flex}
#ov img{max-width:100%;max-height:88vh;border-radius:8px;object-fit:contain}
#ov .x{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:18px;width:34px;height:34px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>
<div id="app">

  <div id="hd">
    <div class="av">🏌️<div class="dot"></div></div>
    <div class="hi">
      <div class="ti">골프존 POS 고객지원</div>
      <div class="su">365일 연중무휴 · 1661-9479</div>
    </div>
    <div style="display:flex;gap:6px">
      <button class="nb" onclick="goTop()" title="맨 위로">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
      </button>
      <button class="nb" onclick="goBottom()" title="맨 아래로">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
    </div>
  </div>

  <div id="chat"></div>

  <div id="ib">
    <input type="text" id="ui" placeholder="어떻게 도와드릴까요? (예: 카드결제)">
    <button id="sb">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<!-- 플로팅 TOP 버튼 -->
<button id="fab" onclick="goTop()" title="맨 위로">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
</button>

<div id="ov"><button class="x" onclick="closeImg()">✕</button><img id="oi" src="" alt=""></div>

/* ── 상태 ── */
let loading = false;

/* ── IntersectionObserver (레이지 이미지 로딩) ── */
const imgObserver = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      const img = e.target;
      if (img.dataset.src) {
        img.src = img.dataset.src;
        img.onload = () => img.classList.add('loaded');
        img.removeAttribute('data-src');
        imgObserver.unobserve(img);
      }
    }
  });
}, {rootMargin:'100px'});

/* ── 플로팅 버튼 스크롤 감지 ── */
const chat = document.getElementById('chat');
const fab   = document.getElementById('fab');
chat.addEventListener('scroll', () => {
  fab.classList.toggle('show', chat.scrollTop > 300);
}, {passive:true});

/* ── 초기화 ── */
window.onload = () => {
  renderWelcome();
  renderQuickBtns();
};
document.getElementById('sb').onclick = handleSend;
document.getElementById('ui').onkeypress = e => e.key==='Enter' && handleSend();

/* ── 네비 ── */
function goTop()    { chat.scrollTo({top:0,behavior:'smooth'}); }
function goBottom() { chat.scrollTo({top:chat.scrollHeight,behavior:'smooth'}); }

/* ── 이미지 오버레이 ── */
function showImg(src) { document.getElementById('oi').src=src; document.getElementById('ov').classList.add('on'); }
function closeImg()   { document.getElementById('ov').classList.remove('on'); }

/* ── 환영 ── */
function renderWelcome() {
  addRow('bot', el => {
    el.classList.add('info-bub');
    el.innerHTML=`
      <div style="font-size:15px;font-weight:700;margin-bottom:7px;">안녕하세요! 무엇을 도와드릴까요? 😊</div>
      <div style="font-size:13px;color:var(--t2);line-height:1.65;">결제 방법부터 오류 해결까지<br>아래에서 선택하시거나 직접 입력해 주세요.</div>
      <div style="margin:9px 0 3px;font-size:11px;font-weight:600;color:var(--t2);">[운영 시간]</div>
      <div class="hr"><span>운영</span><span style="color:var(--pl);font-weight:700;">365일 연중무휴 24시간</span></div>
      <div class="tel-row">📞 <strong style="color:var(--pl);">1661-9479</strong><span style="font-size:12px;color:var(--t2);">&nbsp;골프존 POS 고객센터</span></div>`;
  }, true);
}

/* ── 퀵버튼 ── */
function renderQuickBtns() {
  const row  = document.createElement('div');
  row.className = 'row bot qrow';
  const wrap = document.createElement('div');
  wrap.className = 'q-wrap';
  DB.scenarios.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'qb';
    btn.innerHTML = `<span class="tag">#</span>${s.title}`;
    btn.onclick = () => {
      document.querySelectorAll('.qrow').forEach(el => el.remove());
      usrMsg('#' + s.title);
      const dots = showDots();
      setTimeout(() => { dots.remove(); renderResult(s); }, 450);
    };
    wrap.appendChild(btn);
  });
  row.appendChild(wrap);
  chat.appendChild(row);
  setTimeout(() => row.scrollIntoView({behavior:'smooth',block:'start'}), 60);
}

/* ── 검색 ── */
function search(q) {
  q = q.replace(/\s/g,'').toLowerCase();
  let best=null, max=0;
  DB.scenarios.forEach(s => {
    let sc=0;
    if (s.title.replace(/\s/g,'').toLowerCase().includes(q)) sc+=100;
    if (s.summary.replace(/\s/g,'').toLowerCase().includes(q)) sc+=30;
    (DB.intents[s.id]||[]).forEach(p => {
      if (q.includes(p.replace(/\s/g,'').toLowerCase())) sc+=50;
    });
    if (sc>max){max=sc;best=s;}
  });
  return max>20?best:null;
}

/* ── 결과 카드 ── */
function renderResult(s) {
  const checks  = DB.checks[s.id] || [];
  const imgKeys = DB.images[s.id] || [];
  const txt     = DB.texts[s.id];

  addRow('bot', el => {
    el.classList.add('card');

    const ti = document.createElement('div');
    ti.className='card-ti'; ti.textContent=s.title;
    el.appendChild(ti);

    const su = document.createElement('div');
    su.className='card-su'; su.textContent=s.summary;
    el.appendChild(su);

    // 첫 번째 이미지 (레이지)
    if (imgKeys[0] && IMGS[imgKeys[0]]) addLazyImg(el, imgKeys[0], s.title);

    // 스텝
    checks.forEach((c,i) => {
      const step=document.createElement('div'); step.className='card-step';
      const num=document.createElement('div'); num.className='snum'; num.textContent=i+1;
      const body=document.createElement('div');
      body.innerHTML=`<b>${esc(c.t)}</b><br><span>${esc(c.d)}</span>`;
      step.appendChild(num); step.appendChild(body); el.appendChild(step);
    });

    // 두 번째 이미지 (레이지)
    if (imgKeys[1] && IMGS[imgKeys[1]]) addLazyImg(el, imgKeys[1], s.title+'2');

    // 안내 텍스트
    if (txt) {
      const p=document.createElement('div'); p.className='card-txt'; p.textContent=txt;
      el.appendChild(p);
    }

    // 전화 버튼
    const btn=document.createElement('button'); btn.className='card-btn';
    btn.textContent='📞 고객센터 연결 (1661-9479)';
    btn.onclick=()=>window.location.href='tel:1661-9479';
    el.appendChild(btn);
  }, true);

  setTimeout(() => {
    addRow('bot', el => {
      el.className='bub';
      el.style.cssText='background:#242424;border-bottom-left-radius:3px;';
      el.innerHTML='도움이 되셨나요? 😊<br><button class="more-btn" onclick="showMore(this)">☰ 다른 질문 보기</button>';
    });
    scroll();
  }, 320);
}

function addLazyImg(parent, key, alt) {
  const wrap = document.createElement('div');
  wrap.className = 'card-img-wrap';
  const img = document.createElement('img');
  img.className = 'card-img';
  img.dataset.src = IMGS[key];
  img.alt = alt;
  img.onclick = () => showImg(IMGS[key]);
  wrap.appendChild(img);
  parent.appendChild(wrap);
  const hint = document.createElement('div');
  hint.className = 'img-hint';
  hint.textContent = '이미지를 누르면 확대됩니다 🔍';
  parent.appendChild(hint);
  imgObserver.observe(img);  // 뷰포트 진입 시 로드
}

function showMore(btn) {
  btn.closest('.row').style.display='none';
  renderQuickBtns();
}

/* ── 입력 처리 ── */
function handleSend() {
  const el=document.getElementById('ui'), text=el.value.trim();
  if (!text||loading) return;
  document.querySelectorAll('.qrow').forEach(e=>e.remove());
  usrMsg(text); el.value='';
  loading=true; document.getElementById('sb').disabled=true;
  const dots=showDots();
  setTimeout(()=>{
    dots.remove(); loading=false; document.getElementById('sb').disabled=false;
    const res=search(text);
    if (res) { renderResult(res); }
    else {
      addRow('bot',el=>{el.className='bub';el.textContent='죄송해요, 정확히 찾지 못했어요 🙏\n아래에서 선택하시거나 다시 입력해 주세요.';});
      renderQuickBtns();
    }
  }, 550);
}

/* ── DOM 헬퍼 ── */
function addRow(type, buildFn, isCard=false) {
  const row=document.createElement('div'); row.className=`row ${type}`;
  const el=document.createElement('div'); if(!isCard) el.className='bub';
  buildFn(el); row.appendChild(el);
  const ts=document.createElement('div'); ts.className='ts'; ts.textContent=now();
  row.appendChild(ts); chat.appendChild(row); scroll(); return row;
}
function usrMsg(t)  { addRow('usr',el=>{el.textContent=t;}); }
function showDots() {
  const row=document.createElement('div'); row.className='row bot';
  const b=document.createElement('div'); b.className='bub'; b.style.padding='0';
  b.innerHTML='<div class="dots"><span></span><span></span><span></span></div>';
  row.appendChild(b); chat.appendChild(row); scroll(); return row;
}
function scroll() { requestAnimationFrame(()=>{chat.scrollTop=chat.scrollHeight;}); }
function now()    { return new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}); }
function esc(s)   { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
